<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1520"/>
      <stop offset="100%" style="stop-color:#122030"/>
    </linearGradient>
  </defs>

  <!-- Dark teal background -->
  <rect width="320" height="100" fill="url(#bg)"/>

  <!-- Subtle diagonal lines pattern -->
  <g opacity="0.04" stroke="#2980b9" stroke-width="0.5">
    <line x1="0" y1="0" x2="100" y2="100"/>
    <line x1="40" y1="0" x2="140" y2="100"/>
    <line x1="80" y1="0" x2="180" y2="100"/>
    <line x1="120" y1="0" x2="220" y2="100"/>
    <line x1="160" y1="0" x2="260" y2="100"/>
    <line x1="200" y1="0" x2="300" y2="100"/>
    <line x1="240" y1="0" x2="340" y2="100"/>
  </g>

  <!-- TransferMate text - prominent -->
  <text x="20" y="38" font-family="Inter, sans-serif" font-size="14" font-weight="800" fill="#2980b9" letter-spacing="0.5">TransferMate</text>

  <!-- Divider line -->
  <rect x="20" y="46" width="40" height="2" rx="1" fill="#2980b9" opacity="0.4"/>

  <!-- Category label -->
  <text x="20" y="66" font-family="Inter, sans-serif" font-size="9" font-weight="500" fill="#ffffff" opacity="0.7" letter-spacing="0.3">AUTOMATION</text>

  <!-- Subtle description -->
  <text x="20" y="82" font-family="Inter, sans-serif" font-size="7.5" fill="#ffffff" opacity="0.35">CRON · Bots · Workflows · Process automation</text>

  <!-- Right side: abstract gear/automation icon -->
  <g opacity="0.25">
    <!-- Gear -->
    <circle cx="270" cy="40" r="14" fill="none" stroke="#2980b9" stroke-width="1"/>
    <circle cx="270" cy="40" r="6" fill="none" stroke="#2980b9" stroke-width="0.8"/>
    <!-- Gear teeth -->
    <line x1="270" y1="24" x2="270" y2="28" stroke="#2980b9" stroke-width="1.5"/>
    <line x1="270" y1="52" x2="270" y2="56" stroke="#2980b9" stroke-width="1.5"/>
    <line x1="254" y1="40" x2="258" y2="40" stroke="#2980b9" stroke-width="1.5"/>
    <line x1="282" y1="40" x2="286" y2="40" stroke="#2980b9" stroke-width="1.5"/>
    <!-- Arrow flow -->
    <path d="M 250 70 L 270 70 L 270 65 L 280 72 L 270 79 L 270 74 L 250 74 Z" fill="#2980b9" opacity="0.4"/>
    <!-- Check mark -->
    <circle cx="295" cy="72" r="8" fill="none" stroke="#2980b9" stroke-width="0.8" opacity="0.5"/>
    <path d="M 290 72 L 293 75 L 300 68" stroke="#2980b9" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="97" width="320" height="3" fill="#2980b9" opacity="0.6"/>
</svg>
