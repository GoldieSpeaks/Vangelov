<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#091825"/>
      <stop offset="100%" style="stop-color:#0d2540"/>
    </linearGradient>
  </defs>

  <!-- Dark blue background -->
  <rect width="320" height="100" fill="url(#bg)"/>

  <!-- Subtle diagonal lines pattern -->
  <g opacity="0.04" stroke="#3498db" stroke-width="0.5">
    <line x1="0" y1="0" x2="100" y2="100"/>
    <line x1="40" y1="0" x2="140" y2="100"/>
    <line x1="80" y1="0" x2="180" y2="100"/>
    <line x1="120" y1="0" x2="220" y2="100"/>
    <line x1="160" y1="0" x2="260" y2="100"/>
    <line x1="200" y1="0" x2="300" y2="100"/>
    <line x1="240" y1="0" x2="340" y2="100"/>
  </g>

  <!-- TransferMate text - prominent -->
  <text x="20" y="38" font-family="Inter, sans-serif" font-size="14" font-weight="800" fill="#3498db" letter-spacing="0.5">TransferMate</text>

  <!-- Divider line -->
  <rect x="20" y="46" width="40" height="2" rx="1" fill="#3498db" opacity="0.4"/>

  <!-- Category label -->
  <text x="20" y="66" font-family="Inter, sans-serif" font-size="9" font-weight="500" fill="#ffffff" opacity="0.7" letter-spacing="0.3">API DEVELOPMENT</text>

  <!-- Subtle description -->
  <text x="20" y="82" font-family="Inter, sans-serif" font-size="7.5" fill="#ffffff" opacity="0.35">REST · JWT · OpenAPI · Batch processing</text>

  <!-- Right side: abstract API icon -->
  <g opacity="0.25">
    <!-- Code brackets -->
    <text x="240" y="35" font-family="monospace" font-size="20" fill="#3498db" opacity="0.6">{</text>
    <text x="280" y="55" font-family="monospace" font-size="20" fill="#3498db" opacity="0.4">}</text>
    <!-- Endpoint lines -->
    <rect x="250" y="40" width="35" height="3" rx="1" fill="#3498db" opacity="0.5"/>
    <rect x="255" y="48" width="25" height="3" rx="1" fill="#3498db" opacity="0.3"/>
    <rect x="255" y="56" width="30" height="3" rx="1" fill="#3498db" opacity="0.2"/>
    <!-- Connection dots -->
    <circle cx="260" cy="75" r="2" fill="#3498db"/>
    <circle cx="275" cy="80" r="1.5" fill="#3498db" opacity="0.5"/>
    <circle cx="250" cy="82" r="1.5" fill="#3498db" opacity="0.5"/>
    <line x1="260" y1="75" x2="275" y2="80" stroke="#3498db" stroke-width="0.5"/>
    <line x1="260" y1="75" x2="250" y2="82" stroke="#3498db" stroke-width="0.5"/>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="97" width="320" height="3" fill="#3498db" opacity="0.6"/>
</svg>
