<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#091c2e"/>
      <stop offset="100%" style="stop-color:#0d2b45"/>
    </linearGradient>
  </defs>

  <!-- Dark blue background -->
  <rect width="320" height="100" fill="url(#bg)"/>

  <!-- Subtle diagonal lines pattern -->
  <g opacity="0.04" stroke="#00a3e0" stroke-width="0.5">
    <line x1="0" y1="0" x2="100" y2="100"/>
    <line x1="40" y1="0" x2="140" y2="100"/>
    <line x1="80" y1="0" x2="180" y2="100"/>
    <line x1="120" y1="0" x2="220" y2="100"/>
    <line x1="160" y1="0" x2="260" y2="100"/>
    <line x1="200" y1="0" x2="300" y2="100"/>
    <line x1="240" y1="0" x2="340" y2="100"/>
  </g>

  <!-- TransferMate text - prominent -->
  <text x="20" y="38" font-family="Inter, sans-serif" font-size="14" font-weight="800" fill="#00a3e0" letter-spacing="0.5">TransferMate</text>

  <!-- Divider line -->
  <rect x="20" y="46" width="40" height="2" rx="1" fill="#00a3e0" opacity="0.4"/>

  <!-- Category label -->
  <text x="20" y="66" font-family="Inter, sans-serif" font-size="9" font-weight="500" fill="#ffffff" opacity="0.7" letter-spacing="0.3">PLATFORM DELIVERY</text>

  <!-- Subtle description -->
  <text x="20" y="82" font-family="Inter, sans-serif" font-size="7.5" fill="#ffffff" opacity="0.35">Web · API · CRM · Multi-system architecture</text>

  <!-- Right side: abstract platform icon -->
  <g opacity="0.25">
    <rect x="240" y="20" width="28" height="20" rx="3" fill="none" stroke="#00a3e0" stroke-width="1"/>
    <rect x="250" y="25" width="20" height="3" rx="1" fill="#00a3e0" opacity="0.5"/>
    <rect x="250" y="31" width="12" height="3" rx="1" fill="#00a3e0" opacity="0.3"/>
    <rect x="272" y="20" width="28" height="20" rx="3" fill="none" stroke="#00a3e0" stroke-width="0.7"/>
    <rect x="278" y="25" width="16" height="3" rx="1" fill="#00a3e0" opacity="0.3"/>
    <rect x="240" y="44" width="60" height="20" rx="3" fill="none" stroke="#00a3e0" stroke-width="0.7"/>
    <rect x="248" y="50" width="30" height="3" rx="1" fill="#00a3e0" opacity="0.3"/>
    <rect x="248" y="56" width="20" height="3" rx="1" fill="#00a3e0" opacity="0.2"/>
    <!-- Connection dots -->
    <circle cx="270" cy="70" r="2" fill="#00a3e0"/>
    <circle cx="280" cy="76" r="1.5" fill="#00a3e0" opacity="0.5"/>
    <circle cx="260" cy="78" r="1.5" fill="#00a3e0" opacity="0.5"/>
    <line x1="270" y1="70" x2="280" y2="76" stroke="#00a3e0" stroke-width="0.5"/>
    <line x1="270" y1="70" x2="260" y2="78" stroke="#00a3e0" stroke-width="0.5"/>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="97" width="320" height="3" fill="#00a3e0" opacity="0.6"/>
</svg>
