<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1a0f"/>
      <stop offset="100%" style="stop-color:#152515"/>
    </linearGradient>
  </defs>

  <!-- Dark green background -->
  <rect width="320" height="100" fill="url(#bg)"/>

  <!-- Subtle diagonal lines pattern -->
  <g opacity="0.04" stroke="#7dba5c" stroke-width="0.5">
    <line x1="0" y1="0" x2="100" y2="100"/>
    <line x1="40" y1="0" x2="140" y2="100"/>
    <line x1="80" y1="0" x2="180" y2="100"/>
    <line x1="120" y1="0" x2="220" y2="100"/>
    <line x1="160" y1="0" x2="260" y2="100"/>
    <line x1="200" y1="0" x2="300" y2="100"/>
    <line x1="240" y1="0" x2="340" y2="100"/>
  </g>

  <!-- TransferMate text - prominent -->
  <text x="20" y="38" font-family="Inter, sans-serif" font-size="14" font-weight="800" fill="#7dba5c" letter-spacing="0.5">TransferMate</text>

  <!-- Divider line -->
  <rect x="20" y="46" width="40" height="2" rx="1" fill="#7dba5c" opacity="0.4"/>

  <!-- Category label -->
  <text x="20" y="66" font-family="Inter, sans-serif" font-size="9" font-weight="500" fill="#ffffff" opacity="0.7" letter-spacing="0.3">PAYMENTS</text>

  <!-- Subtle description -->
  <text x="20" y="82" font-family="Inter, sans-serif" font-size="7.5" fill="#ffffff" opacity="0.35">Multi-currency · Providers · Card · Bank transfer</text>

  <!-- Right side: abstract payment icon -->
  <g opacity="0.25">
    <!-- Card shape -->
    <rect x="240" y="25" width="50" height="32" rx="4" fill="none" stroke="#7dba5c" stroke-width="1"/>
    <rect x="248" y="33" width="20" height="4" rx="1" fill="#7dba5c" opacity="0.5"/>
    <rect x="248" y="41" width="30" height="3" rx="1" fill="#7dba5c" opacity="0.3"/>
    <rect x="248" y="48" width="15" height="3" rx="1" fill="#7dba5c" opacity="0.2"/>
    <!-- Currency symbols -->
    <text x="248" y="78" font-family="Inter, sans-serif" font-size="9" fill="#7dba5c" opacity="0.5">$</text>
    <text x="262" y="78" font-family="Inter, sans-serif" font-size="9" fill="#7dba5c" opacity="0.4">EUR</text>
    <text x="282" y="78" font-family="Inter, sans-serif" font-size="9" fill="#7dba5c" opacity="0.3">GBP</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="97" width="320" height="3" fill="#7dba5c" opacity="0.6"/>
</svg>
