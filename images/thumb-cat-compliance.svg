<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1410"/>
      <stop offset="100%" style="stop-color:#251c12"/>
    </linearGradient>
  </defs>

  <!-- Dark amber background -->
  <rect width="320" height="100" fill="url(#bg)"/>

  <!-- Subtle diagonal lines pattern -->
  <g opacity="0.04" stroke="#f39c12" stroke-width="0.5">
    <line x1="0" y1="0" x2="100" y2="100"/>
    <line x1="40" y1="0" x2="140" y2="100"/>
    <line x1="80" y1="0" x2="180" y2="100"/>
    <line x1="120" y1="0" x2="220" y2="100"/>
    <line x1="160" y1="0" x2="260" y2="100"/>
    <line x1="200" y1="0" x2="300" y2="100"/>
    <line x1="240" y1="0" x2="340" y2="100"/>
  </g>

  <!-- TransferMate text - prominent -->
  <text x="20" y="38" font-family="Inter, sans-serif" font-size="14" font-weight="800" fill="#f39c12" letter-spacing="0.5">TransferMate</text>

  <!-- Divider line -->
  <rect x="20" y="46" width="40" height="2" rx="1" fill="#f39c12" opacity="0.4"/>

  <!-- Category label -->
  <text x="20" y="66" font-family="Inter, sans-serif" font-size="9" font-weight="500" fill="#ffffff" opacity="0.7" letter-spacing="0.3">COMPLIANCE</text>

  <!-- Subtle description -->
  <text x="20" y="82" font-family="Inter, sans-serif" font-size="7.5" fill="#ffffff" opacity="0.35">KYC · AML · GDPR · Regulatory frameworks</text>

  <!-- Right side: abstract shield/compliance icon -->
  <g opacity="0.25">
    <!-- Shield shape -->
    <path d="M 265 25 L 285 20 L 305 25 L 305 50 C 305 62 285 72 285 72 C 285 72 265 62 265 50 Z" fill="none" stroke="#f39c12" stroke-width="1"/>
    <!-- Check mark inside -->
    <path d="M 277 45 L 283 51 L 295 39" stroke="#f39c12" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
    <!-- Document lines -->
    <rect x="250" y="78" width="20" height="2" rx="1" fill="#f39c12" opacity="0.3"/>
    <rect x="275" y="78" width="15" height="2" rx="1" fill="#f39c12" opacity="0.2"/>
    <rect x="250" y="84" width="30" height="2" rx="1" fill="#f39c12" opacity="0.15"/>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="97" width="320" height="3" fill="#f39c12" opacity="0.6"/>
</svg>
