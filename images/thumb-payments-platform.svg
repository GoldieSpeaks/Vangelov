<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7dba5c"/>
      <stop offset="100%" style="stop-color:#a8e063"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e1e"/>
      <stop offset="100%" style="stop-color:#151515"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="200" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#7dba5c" stroke-width="0.5" fill="none">
    <line x1="0" y1="40" x2="480" y2="40"/>
    <line x1="0" y1="80" x2="480" y2="80"/>
    <line x1="0" y1="120" x2="480" y2="120"/>
    <line x1="0" y1="160" x2="480" y2="160"/>
    <line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="240" y1="0" x2="240" y2="200"/>
    <line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
  </g>

  <!-- Left: Browser mockup -->
  <rect x="30" y="35" width="180" height="130" rx="6" fill="url(#cardBg)" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Browser dots -->
  <circle cx="44" cy="47" r="3" fill="#e94560"/>
  <circle cx="54" cy="47" r="3" fill="#f39c12"/>
  <circle cx="64" cy="47" r="3" fill="#7dba5c"/>
  <!-- Browser content area -->
  <rect x="36" y="56" width="168" height="103" rx="2" fill="#0a0a0a"/>
  <!-- Nav bar -->
  <rect x="40" y="60" width="80" height="6" rx="2" fill="#252525"/>
  <!-- Hero block -->
  <rect x="40" y="72" width="100" height="8" rx="2" fill="#333"/>
  <rect x="40" y="84" width="70" height="5" rx="1" fill="#222"/>
  <!-- Payment card representation -->
  <rect x="40" y="96" width="60" height="38" rx="4" fill="#1a1a1a" stroke="#7dba5c" stroke-width="0.8" opacity="0.8"/>
  <rect x="46" y="104" width="30" height="4" rx="1" fill="#7dba5c" opacity="0.5"/>
  <rect x="46" y="112" width="20" height="3" rx="1" fill="#444"/>
  <rect x="46" y="118" width="40" height="3" rx="1" fill="#333"/>
  <rect x="46" y="124" width="15" height="4" rx="2" fill="#7dba5c" opacity="0.7"/>
  <!-- CTA button -->
  <rect x="110" y="100" width="50" height="14" rx="3" fill="#7dba5c" opacity="0.15" stroke="#7dba5c" stroke-width="0.5"/>
  <rect x="118" y="105" width="34" height="4" rx="1" fill="#7dba5c" opacity="0.6"/>

  <!-- Middle: Connection lines -->
  <g stroke="url(#accent)" stroke-width="1.5" fill="none" opacity="0.4">
    <path d="M 220 80 C 240 80, 240 60, 260 60"/>
    <path d="M 220 100 C 240 100, 240 100, 260 100"/>
    <path d="M 220 120 C 240 120, 240 140, 260 140"/>
  </g>
  <!-- Connection dots -->
  <circle cx="220" cy="80" r="3" fill="#7dba5c" opacity="0.6"/>
  <circle cx="220" cy="100" r="3" fill="#7dba5c" opacity="0.6"/>
  <circle cx="220" cy="120" r="3" fill="#7dba5c" opacity="0.6"/>

  <!-- Right: API/System blocks -->
  <rect x="260" y="42" width="90" height="30" rx="5" fill="url(#cardBg)" stroke="#2a2a2a" stroke-width="1"/>
  <text x="275" y="61" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#7dba5c">WEB APP</text>

  <rect x="260" y="84" width="90" height="30" rx="5" fill="url(#cardBg)" stroke="#2a2a2a" stroke-width="1"/>
  <text x="275" y="103" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#e0e0e0">REST API</text>

  <rect x="260" y="126" width="90" height="30" rx="5" fill="url(#cardBg)" stroke="#2a2a2a" stroke-width="1"/>
  <text x="275" y="145" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#888">CRM</text>

  <!-- Right side: data flow arrows -->
  <g stroke="#333" stroke-width="1" fill="none" opacity="0.5">
    <path d="M 355 57 L 380 57 L 380 99 L 395 99" marker-end="url(#arrowhead)"/>
    <path d="M 355 141 L 380 141 L 380 99 L 395 99"/>
  </g>

  <!-- Database icon -->
  <ellipse cx="415" cy="93" rx="18" ry="7" fill="none" stroke="#555" stroke-width="1"/>
  <path d="M 397 93 L 397 107 C 397 111, 415 115, 433 107 L 433 93" fill="none" stroke="#555" stroke-width="1"/>
  <text x="406" y="104" font-family="Inter, sans-serif" font-size="7" fill="#555">DB</text>

  <!-- Globe icon (multi-country) -->
  <circle cx="440" cy="50" r="16" fill="none" stroke="#7dba5c" stroke-width="0.8" opacity="0.3"/>
  <ellipse cx="440" cy="50" rx="8" ry="16" fill="none" stroke="#7dba5c" stroke-width="0.5" opacity="0.3"/>
  <line x1="424" y1="50" x2="456" y2="50" stroke="#7dba5c" stroke-width="0.5" opacity="0.3"/>

  <!-- TransferMate brand -->
  <text x="468" y="186" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#00a3e0" opacity="0.7" text-anchor="end" letter-spacing="0.5">TransferMate</text>

  <!-- Bottom accent line -->
  <rect x="0" y="196" width="480" height="4" fill="url(#accent)" opacity="0.6"/>
</svg>
